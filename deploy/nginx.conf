# ──────────────────────────────────────────────────────────────────────────────
# HRIS Platform – Nginx configuration
# Handles TLS termination, rate-limiting, and proxying to Next.js + API.
# For production TLS: replace the listen 443 block with real cert paths
# or use Certbot to manage /etc/nginx/sites-enabled/*.
# ──────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
  worker_connections 2048;
}

http {
  # ── basics ─────────────────────────────────────────────────────────────
  include          mime.types;
  default_type     application/octet-stream;
  sendfile         on;
  keepalive_timeout 65;
  server_tokens    off;                        # hide Nginx version

  # ── rate limiting ──────────────────────────────────────────────────────
  limit_req_zone   $binary_remote_addr zone=api_rate:10m rate=30r/s;
  limit_req_zone   $binary_remote_addr zone=auth_rate:10m rate=5r/s;

  # ── log format ─────────────────────────────────────────────────────────
  log_format main
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_size_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" '
    'rt=$request_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── upstream pools ─────────────────────────────────────────────────────
  upstream nextjs {
    server web:3000;
    keepalive 32;
  }
  upstream api {
    server api:3001;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── main HTTPS server ──────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS (self-signed for dev; replace paths for prod) ──────────────
    ssl_certificate      /etc/nginx/certs/cert.pem;
    ssl_certificate_key  /etc/nginx/certs/key.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;

    # ── security headers ─────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           DENY                                  always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    # ── static uploads (documents / avatars) ─────────────────────────
    location /uploads/ {
      alias   /data/uploads/;
      expires 30d;
      add_header Cache-Control immutable;
      # Only allow known extensions
      location ~ \.(pdf|png|jpg|jpeg|gif|webp|docx)$ { }
      location ~ . { return 404; }
    }

    # ── API proxy ────────────────────────────────────────────────────
    location /api/ {
      proxy_pass       http://api;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;

      # Rate-limit: 30 req/s burst 60
      limit_req zone=api_rate burst=60 nodelay;

      # Stricter limit on auth endpoints
      location /api/auth/login {
        limit_req zone=auth_rate burst=10 nodelay;
        proxy_pass http://api;
      }

      # Upload size
      client_max_body_size 50M;

      # Timeouts
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── Next.js (catch-all) ──────────────────────────────────────────
    location / {
      proxy_pass       http://nextjs;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  $scheme;

      # Next.js static assets – aggressive caching
      location /_next/static/ {
        expires 1y;
        add_header Cache-Control immutable;
      }
    }

    # ── health ─────────────────────────────────────────────────────
    location = /health {
      access_log off;
      proxy_pass http://api/health;
    }
  }
}
