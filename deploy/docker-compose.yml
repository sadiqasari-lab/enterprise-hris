version: '3.9'

# ── shared network ─────────────────────────────────────────────────────────
networks:
  hris-net:
    driver: bridge

# ── shared volumes ─────────────────────────────────────────────────────────
volumes:
  pgdata:
  redis-data:
  uploads:    # document uploads

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-hris}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB:       ${DB_NAME:-hris_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"           # expose for migration tooling; remove in prod
    networks:
      - hris-net
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - hris-net

  # ─── Prisma Migrate (init container) ────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: builder
    command: pnpx prisma migrate deploy --schema ../../packages/database/schema.prisma
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-hris}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-hris_db}
    networks:
      - hris-net
    restart: "no"          # runs once

  # ─── API Server ──────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      NODE_ENV:       production
      PORT:           3001
      DATABASE_URL:   postgresql://${DB_USER:-hris}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-hris_db}
      REDIS_URL:      redis://redis:6379
      JWT_SECRET:     ${JWT_SECRET:-changeme-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme-in-prod}
      UPLOAD_DIR:     /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - hris-net

  # ─── Web (Next.js) ───────────────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   http://api:3001/api   # internal; nginx handles external
    ports:
      - "3000:3000"
    networks:
      - hris-net

  # ─── Nginx (reverse proxy & static files) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/data/uploads:ro    # serve uploaded docs at /uploads/*
    ports:
      - "80:80"
      - "443:443"
    networks:
      - hris-net
