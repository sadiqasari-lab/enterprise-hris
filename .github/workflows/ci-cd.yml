name: HRIS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @hris/api lint

      - name: Unit tests
        run: pnpm --filter @hris/api test
        env:
          CI: true

  # ── Build Docker images ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/hris-api:latest
            ${{ secrets.DOCKERHUB_USER }}/hris-api:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/hris-web:latest
            ${{ secrets.DOCKERHUB_USER }}/hris-web:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

  # ── Deploy to VPS ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/hris
            docker pull ${{ secrets.DOCKERHUB_USER }}/hris-api:latest
            docker pull ${{ secrets.DOCKERHUB_USER }}/hris-web:latest
            docker compose up -d --remove-orphans
            docker system prune -f
